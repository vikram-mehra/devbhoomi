# Most reliable fix for 404: point Apache at /public (not the repo root).
# 1) Copy this block into C:\xampp\apache\conf\extra\httpd-vhosts.conf
#    (or Include a separate file from httpd.conf).
# 2) Ensure in httpd.conf: LoadModule rewrite_module ... (uncommented)
#    and AllowOverride All for your htdocs / vhost Directory.
# 3) Add to C:\Windows\System32\drivers\etc\hosts:
#      127.0.0.1  zionshoping.test
# 4) Restart Apache. Open http://zionshoping.test/
# 5) Set .env: APP_URL=http://zionshoping.test

<VirtualHost *:80>
    DocumentRoot "C:/xampp/htdocs/zionshoping/public"
    ServerName zionshoping.test
    <Directory "C:/xampp/htdocs/zionshoping/public">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>
</VirtualHost>
